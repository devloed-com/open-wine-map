[project]
name = "open-wine-map"
version = "0.0.1"
description = "open wine map — reference wiki and map of French wine appellations, generated from INAO cahiers des charges"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.32",
    "geopandas>=1.0",
    "shapely>=2.0",
    "rapidfuzz>=3.9",
    "pypdf>=4.3",
    "tqdm>=4.66",
    "pyogrio>=0.12.1",
    "babel>=2.16",
    "anthropic>=0.40",
    "lingua-language-detector>=2.2.0",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "pytest>=8.3",
]

[tool.ruff]
line-length = 100
target-version = "py312"
