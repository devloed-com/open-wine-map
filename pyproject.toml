[project]
name = "open-wine-map"
version = "0.0.1"
description = "open wine map — reference wiki and map of French wine appellations, generated from INAO cahiers des charges"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.32",
    "geopandas>=1.0",
    "shapely>=2.0",
    "rapidfuzz>=3.9",
    "pypdf>=4.3",
    "tqdm>=4.66",
    "pyogrio>=0.12.1",
    "babel>=2.16",
    "anthropic>=0.40",
    "lingua-language-detector>=2.2.0",
    "unidecode>=1.3",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "pytest>=8.3",
]
# Optional: only needed by scripts/es/01b_solve_waf.py, the one-off
# bootstrap that fetches EUR-Lex single-document HTMLs blocked by the
# AWS WAF JS challenge. After 01b populates raw/es/oj-pages/, the rest
# of the pipeline never touches Playwright.
bootstrap = [
    "playwright>=1.55",
    "py7zr>=1.1.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# Pinned at zero (see CI). The default E4/E7/E9 + F set, plus pycodestyle
# warnings (W) and import-sorting (I). E501 (line-too-long) is deliberately
# excluded — 900 long lines, many inside template strings, not worth reflowing.
select = ["E4", "E7", "E9", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# Pipeline scripts bootstrap sys.path before importing the in-repo `_lib`
# package, so their `_lib` imports are necessarily not at top-of-file. The
# imports already carry `# noqa: E402` individually; this blanket ignore keeps
# isort-split import lines from re-triggering E402 when they lose the inline
# marker.
"scripts/**" = ["E402"]
